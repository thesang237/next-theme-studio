<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Inter, -apple-system, sans-serif;
    font-size: 12px;
    background: #2c2c2c;
    color: #e5e5e5;
    padding: 16px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  label {
    display: block;
    font-size: 11px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    flex: 1;
    background: #1e1e1e;
    border: 1px solid #3d3d3d;
    border-radius: 4px;
    color: #e5e5e5;
    font-family: "Roboto Mono", "Fira Code", monospace;
    font-size: 11px;
    line-height: 1.5;
    padding: 10px;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus {
    border-color: #7b61ff;
  }

  textarea::placeholder {
    color: #555;
  }

  button {
    width: 100%;
    height: 32px;
    background: #7b61ff;
    border: none;
    border-radius: 4px;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  button:hover:not(:disabled) { background: #6b51ef; }
  button:active:not(:disabled) { background: #5b41df; }
  button:disabled { background: #404040; color: #666; cursor: not-allowed; }

  #status {
    font-size: 11px;
    line-height: 1.7;
    min-height: 20px;
    flex-shrink: 0;
  }

  .ok   { color: #4ade80; }
  .err  { color: #f87171; }
  .line { color: #a3e635; padding-left: 12px; }
  .note { color: #71717a; font-size: 10px; margin-top: 4px; }
</style>
</head>
<body>

<div style="flex-shrink:0">
  <label>Paste Theme Studio export JSON</label>
</div>

<textarea id="json" placeholder='{"collections": [{"name": "Theme Studio", "modes": ["light", "dark"], "variables": [...]}]}'></textarea>

<button id="btn">Import Variables</button>

<div id="status"></div>

<script>
  var btn    = document.getElementById("btn");
  var input  = document.getElementById("json");
  var status = document.getElementById("status");

  btn.addEventListener("click", function () {
    var raw = input.value.trim();
    status.innerHTML = "";

    if (!raw) {
      status.innerHTML = '<span class="err">Paste the exported JSON first.</span>';
      return;
    }

    try {
      JSON.parse(raw); // validate before sending
    } catch (e) {
      status.innerHTML = '<span class="err">Invalid JSON: ' + e.message + '</span>';
      return;
    }

    btn.disabled = true;
    btn.textContent = "Importing…";

    parent.postMessage({ pluginMessage: { type: "import", json: raw } }, "*");
  });

  window.onmessage = function (event) {
    var msg = event.data.pluginMessage;
    if (!msg) return;

    btn.disabled = false;
    btn.textContent = "Import Variables";

    if (msg.type === "success") {
      var lines = msg.results.map(function (r) {
        return '<div class="line">✓ ' + r + '</div>';
      }).join("");
      status.innerHTML =
        '<div class="ok" style="margin-bottom:4px">Import complete</div>' +
        lines +
        '<div class="note">Open Local Variables panel in Figma to inspect.</div>';
    }

    if (msg.type === "error") {
      status.innerHTML = '<span class="err">Error: ' + msg.message + '</span>';
    }
  };
</script>
</body>
</html>
